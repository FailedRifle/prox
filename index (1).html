<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GhostProxy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --toolbar: #13132b;
      --accent: #7c4dff;
      --accent2: #00e5ff;
      --text: #e8e8f0;
      --muted: #666688;
      --input-bg: #1a1a35;
      --border: #2a2a4a;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Browser Shell ── */
    .browser { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; background: var(--toolbar);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      -webkit-app-region: drag;
    }

    .nav-btns { display: flex; gap: 2px; -webkit-app-region: no-drag; }

    .nav-btns button, .toolbar-actions button {
      background: none; border: none; color: var(--text);
      font-size: 17px; padding: 5px 9px; border-radius: 7px;
      cursor: pointer; transition: background 0.15s; line-height: 1;
      -webkit-app-region: no-drag;
    }

    .nav-btns button:hover, .toolbar-actions button:hover { background: rgba(255,255,255,0.07); }
    .nav-btns button:disabled { color: var(--muted); cursor: default; }

    /* URL Bar */
    .url-form {
      flex: 1; display: flex; align-items: center;
      background: var(--input-bg); border: 1.5px solid var(--border);
      border-radius: 24px; padding: 0 6px 0 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-app-region: no-drag;
    }

    .url-form:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,77,255,0.18);
    }

    .url-icon { color: var(--muted); display: flex; align-items: center; margin-right: 8px; flex-shrink: 0; }

    #url-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 14px; padding: 8px 0;
    }
    #url-input::placeholder { color: var(--muted); }

    #go-btn {
      background: var(--accent); border: none; color: #fff;
      padding: 5px 16px; border-radius: 20px; cursor: pointer;
      font-size: 13px; font-weight: 600; transition: background 0.15s; flex-shrink: 0;
    }
    #go-btn:hover { background: #6a3de8; }

    /* ── Content Area ── */
    .content { flex: 1; position: relative; overflow: hidden; }

    /* Home */
    #home {
      width: 100%; height: 100%; overflow-y: auto;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 56px 20px 40px;
    }
    #home.hidden { display: none; }

    .home-inner { max-width: 600px; width: 100%; }

    .logo { text-align: center; margin-bottom: 52px; }
    .logo-emoji { font-size: 68px; margin-bottom: 14px; display: block; }
    .logo h1 {
      font-size: 38px; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }
    .logo p { color: var(--muted); font-size: 15px; }

    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .tile {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 9px; padding: 22px 12px; background: var(--toolbar);
      border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; text-decoration: none; color: var(--text);
      font-size: 13px; font-weight: 500;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
    }
    .tile:hover { background: var(--input-bg); border-color: var(--accent); transform: translateY(-2px); }
    .tile-icon { font-size: 26px; }

    /* Proxy iframe */
    #proxy-frame {
      width: 100%; height: 100%; border: none; display: block; background: #fff;
    }
    #proxy-frame.hidden { display: none; }

    /* Loading bar */
    #loading {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      animation: loadpulse 1.6s ease-in-out infinite;
      z-index: 20;
    }
    #loading.hidden { display: none; }

    @keyframes loadpulse {
      0%   { transform: scaleX(0); transform-origin: left; opacity: 1; }
      60%  { transform: scaleX(0.85); transform-origin: left; opacity: 1; }
      100% { transform: scaleX(1); transform-origin: left; opacity: 0; }
    }

    /* Error */
    #error {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center; background: var(--bg);
    }
    #error.hidden { display: none; }
    .error-box { text-align: center; padding: 40px; max-width: 420px; }
    .error-box .e-icon { font-size: 52px; margin-bottom: 16px; }
    .error-box h2 { font-size: 22px; margin-bottom: 10px; }
    .error-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    #retry-btn {
      background: var(--accent); border: none; color: #fff;
      padding: 10px 28px; border-radius: var(--radius); cursor: pointer;
      font-size: 14px; font-weight: 600;
    }
    #retry-btn:hover { background: #6a3de8; }

    /* Status bar */
    .statusbar {
      background: var(--toolbar); border-top: 1px solid var(--border);
      padding: 3px 14px; font-size: 11px; color: var(--muted); flex-shrink: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* SW notice */
    #sw-notice {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: #1e1e40; border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 22px; font-size: 13px;
      color: var(--text); box-shadow: var(--shadow); z-index: 100;
      display: flex; align-items: center; gap: 10px;
    }
    #sw-notice.hidden { display: none; }
    #sw-notice span { color: var(--accent2); font-weight: 600; }

    @media (max-width: 500px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .logo h1 { font-size: 30px; }
    }
  </style>
</head>
<body>

<div class="browser">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="nav-btns">
      <button id="btn-back" title="Back" disabled>&#8592;</button>
      <button id="btn-fwd"  title="Forward" disabled>&#8594;</button>
      <button id="btn-reload" title="Reload">&#8635;</button>
    </div>

    <form id="url-form" class="url-form">
      <span class="url-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input id="url-input" type="text" placeholder="Search or enter a URL..." autocomplete="off" spellcheck="false" />
      <button type="submit" id="go-btn">Go</button>
    </form>

    <div class="toolbar-actions">
      <button id="btn-home" title="Home">&#8962;</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Home Screen -->
    <div id="home">
      <div class="home-inner">
        <div class="logo">
          <span class="logo-emoji">👻</span>
          <h1>GhostProxy</h1>
          <p>Browse freely. Fully in your browser.</p>
        </div>

        <p class="section-title">Quick Links</p>
        <div class="grid">
          <a class="tile" href="#" data-url="https://www.google.com">
            <span class="tile-icon">🔍</span>Google
          </a>
          <a class="tile" href="#" data-url="https://www.youtube.com">
            <span class="tile-icon">▶️</span>YouTube
          </a>
          <a class="tile" href="#" data-url="https://www.reddit.com">
            <span class="tile-icon">🟠</span>Reddit
          </a>
          <a class="tile" href="#" data-url="https://www.tiktok.com">
            <span class="tile-icon">🎵</span>TikTok
          </a>
          <a class="tile" href="#" data-url="https://x.com">
            <span class="tile-icon">🐦</span>Twitter / X
          </a>
          <a class="tile" href="#" data-url="https://www.wikipedia.org">
            <span class="tile-icon">📖</span>Wikipedia
          </a>
          <a class="tile" href="#" data-url="https://www.twitch.tv">
            <span class="tile-icon">🟣</span>Twitch
          </a>
          <a class="tile" href="#" data-url="https://www.instagram.com">
            <span class="tile-icon">📸</span>Instagram
          </a>
          <a class="tile" href="#" data-url="https://www.spotify.com">
            <span class="tile-icon">🎧</span>Spotify
          </a>
        </div>
      </div>
    </div>

    <!-- Proxy Frame -->
    <iframe id="proxy-frame" class="hidden"
      sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals allow-downloads"
      allowfullscreen
    ></iframe>

    <!-- Loading -->
    <div id="loading" class="hidden"></div>

    <!-- Error -->
    <div id="error" class="hidden">
      <div class="error-box">
        <div class="e-icon">⚠️</div>
        <h2>Page couldn't load</h2>
        <p id="error-detail">The site couldn't be reached. It may be down or blocking proxies.</p>
        <button id="retry-btn">Try Again</button>
      </div>
    </div>
  </div>

  <div class="statusbar"><span id="status">Ready — GhostProxy</span></div>
</div>

<!-- SW Notice -->
<div id="sw-notice" class="hidden">
  <span>✓</span> GhostProxy is ready!
</div>

<script>
(function () {
  "use strict";

  // ── Service Worker Registration ──────────────────────────
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js", { scope: "/" }).then((reg) => {
      console.log("SW registered:", reg.scope);
      const notice = document.getElementById("sw-notice");
      notice.classList.remove("hidden");
      setTimeout(() => notice.classList.add("hidden"), 3000);
    }).catch((err) => {
      console.error("SW registration failed:", err);
      document.getElementById("error-detail").textContent =
        "Service Worker failed to register. Try opening this page in a private/incognito window, or check that it's served over HTTPS.";
      showError();
    });
  } else {
    document.getElementById("error-detail").textContent =
      "Your browser doesn't support Service Workers. Try Chrome or Firefox.";
    showError();
  }

  // ── Elements ─────────────────────────────────────────────
  const urlInput   = document.getElementById("url-input");
  const urlForm    = document.getElementById("url-form");
  const frame      = document.getElementById("proxy-frame");
  const homeEl     = document.getElementById("home");
  const loadingEl  = document.getElementById("loading");
  const errorEl    = document.getElementById("error");
  const statusEl   = document.getElementById("status");
  const btnBack    = document.getElementById("btn-back");
  const btnFwd     = document.getElementById("btn-fwd");
  const btnReload  = document.getElementById("btn-reload");
  const btnHome    = document.getElementById("btn-home");
  const retryBtn   = document.getElementById("retry-btn");

  // ── State ────────────────────────────────────────────────
  let hist = [], hidx = -1, curUrl = "", loadTimer = null;

  // ── Encoding ─────────────────────────────────────────────
  function encodeUrl(url) {
    return btoa(url).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  function toProxyUrl(url) {
    return "/ghost-proxy/" + encodeUrl(url);
  }

  function normalize(raw) {
    raw = raw.trim();
    if (!raw) return null;
    if (raw.includes(" ") || (!raw.includes(".") && !raw.startsWith("http"))) {
      return "https://www.google.com/search?q=" + encodeURIComponent(raw);
    }
    if (!/^https?:\/\//i.test(raw)) raw = "https://" + raw;
    return raw;
  }

  // ── Navigation ───────────────────────────────────────────
  function navigate(url) {
    url = normalize(url);
    if (!url) return;
    curUrl = url;
    urlInput.value = url;
    hist = hist.slice(0, hidx + 1);
    hist.push(url);
    hidx = hist.length - 1;
    updateBtns();
    startLoad(url);
    showFrame();
    frame.src = toProxyUrl(url);
  }

  function showFrame() {
    homeEl.classList.add("hidden");
    errorEl.classList.add("hidden");
    frame.classList.remove("hidden");
  }

  function showHome() {
    frame.classList.add("hidden");
    errorEl.classList.add("hidden");
    homeEl.classList.remove("hidden");
    frame.src = "about:blank";
    urlInput.value = "";
    curUrl = "";
    stopLoad();
    statusEl.textContent = "Ready — GhostProxy";
  }

  function showError() {
    stopLoad();
    frame.classList.add("hidden");
    homeEl.classList.add("hidden");
    errorEl.classList.remove("hidden");
  }

  function startLoad(url) {
    loadingEl.classList.remove("hidden");
    statusEl.textContent = "Loading " + url;
    if (loadTimer) clearTimeout(loadTimer);
    loadTimer = setTimeout(stopLoad, 10000);
  }

  function stopLoad() {
    loadingEl.classList.add("hidden");
    if (loadTimer) { clearTimeout(loadTimer); loadTimer = null; }
  }

  function updateBtns() {
    btnBack.disabled = hidx <= 0;
    btnFwd.disabled  = hidx >= hist.length - 1;
  }

  // ── Events ───────────────────────────────────────────────
  urlForm.addEventListener("submit", (e) => {
    e.preventDefault();
    navigate(urlInput.value);
  });

  btnBack.addEventListener("click", () => {
    if (hidx > 0) { hidx--; updateBtns(); go(hist[hidx]); }
  });

  btnFwd.addEventListener("click", () => {
    if (hidx < hist.length - 1) { hidx++; updateBtns(); go(hist[hidx]); }
  });

  function go(url) {
    curUrl = url;
    urlInput.value = url;
    startLoad(url);
    showFrame();
    frame.src = toProxyUrl(url);
  }

  btnReload.addEventListener("click", () => {
    if (curUrl) { startLoad(curUrl); frame.src = toProxyUrl(curUrl); }
  });

  btnHome.addEventListener("click", showHome);
  retryBtn.addEventListener("click", () => { if (curUrl) go(curUrl); });

  document.querySelectorAll(".tile").forEach((t) => {
    t.addEventListener("click", (e) => {
      e.preventDefault();
      navigate(t.dataset.url);
    });
  });

  frame.addEventListener("load", () => {
    stopLoad();
    statusEl.textContent = curUrl || "Ready";
  });

  frame.addEventListener("error", () => {
    showError();
  });

  // Ctrl+L to focus URL bar
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "l") {
      e.preventDefault();
      urlInput.focus();
      urlInput.select();
    }
  });

  updateBtns();
})();
</script>
</body>
</html>
