<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CheddarOS Proxy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Tab bar ── */
    .tabbar {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      padding: 0 8px;
      height: 34px;
      gap: 4px;
    }

    .tab {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 4px 4px 0 0;
      padding: 4px 16px;
      font-size: 13px;
      color: #ccc;
      cursor: pointer;
      height: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 100px;
      max-width: 180px;
      user-select: none;
    }

    .tab.active {
      background: #111;
      color: #fff;
      border-bottom-color: #111;
    }

    .tab-close {
      margin-left: auto;
      color: #666;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 3px;
      border-radius: 3px;
    }

    .tab-close:hover { background: #444; color: #fff; }

    .new-tab {
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      padding: 0 6px;
      line-height: 1;
    }

    .new-tab:hover { color: #ccc; }

    /* ── URL bar ── */
    .urlbar {
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #url-input {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      padding: 5px 10px;
      color: #ccc;
      font-size: 13px;
      outline: none;
    }

    #url-input:focus {
      border-color: #555;
      color: #fff;
    }

    #url-input::placeholder { color: #555; }

    .go-btn {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      color: #ccc;
      padding: 5px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    .go-btn:hover { background: #333; color: #fff; }

    /* ── Main content area ── */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      background: #111;
    }

    /* ── Title card ── */
    .title-card {
      border: 1px solid #333;
      border-radius: 4px;
      padding: 16px 80px;
      text-align: center;
      background: #1a1a1a;
    }

    .title-card h1 {
      font-size: 20px;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .title-card .version {
      font-size: 12px;
      color: #555;
      margin-top: 2px;
    }

    /* ── Link input card ── */
    .link-card {
      border: 1px solid #333;
      border-radius: 4px;
      background: #1a1a1a;
      width: 580px;
      max-width: 90vw;
      display: flex;
      align-items: center;
    }

    #link-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 16px 20px;
      color: #ccc;
      font-size: 15px;
      outline: none;
    }

    #link-input::placeholder { color: #444; }
    #link-input:focus { color: #fff; }

    .link-go {
      background: none;
      border: none;
      border-left: 1px solid #333;
      color: #555;
      padding: 14px 18px;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.15s;
    }

    .link-go:hover { color: #fff; }

    /* ── Proxy iframe ── */
    #proxy-frame {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      z-index: 100;
      background: #fff;
    }

    .back-btn {
      display: none;
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 200;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      color: #ccc;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }

    .back-btn:hover { background: #2a2a2a; color: #fff; }
  </style>
</head>
<body>

  <!-- Tab bar -->
  <div class="tabbar" id="tabbar">
    <div class="tab active" id="tab-home">
      <span class="tab-label">tab1</span>
      <span class="tab-close" onclick="closeTab(this)">✕</span>
    </div>
    <button class="new-tab" onclick="newTab()" title="New tab">+</button>
  </div>

  <!-- URL bar -->
  <div class="urlbar">
    <input id="url-input" type="text" placeholder="Link like https://youtube.com" onkeydown="if(event.key==='Enter') navigate()"/>
    <button class="go-btn" onclick="navigate()">Go</button>
  </div>

  <!-- Home content -->
  <div class="content" id="home">
    <div class="title-card">
      <h1>CheddarOS Proxy</h1>
      <div class="version">version 1.0</div>
    </div>
    <div class="link-card">
      <input id="link-input" type="text" placeholder="link" onkeydown="if(event.key==='Enter') goFromCard()"/>
      <button class="link-go" onclick="goFromCard()">→</button>
    </div>
  </div>

  <!-- Proxy frame + back button -->
  <iframe id="proxy-frame"></iframe>
  <button class="back-btn" id="back-btn" onclick="goHome()">← Back</button>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/proxy/' })
        .catch(e => console.warn('SW failed:', e));
    }

    let tabCount = 1;

    function formatUrl(val) {
      val = val.trim();
      if (!val) return null;
      if (!val.startsWith('http://') && !val.startsWith('https://')) {
        val = 'https://' + val;
      }
      try { new URL(val); return val; } catch { return null; }
    }

    function navigate() {
      const val = document.getElementById('url-input').value;
      const url = formatUrl(val);
      if (!url) return alert('Enter a valid URL');
      loadProxy(url);
    }

    function goFromCard() {
      const val = document.getElementById('link-input').value;
      const url = formatUrl(val);
      if (!url) return alert('Enter a valid URL');
      document.getElementById('url-input').value = url;
      loadProxy(url);
    }

    function loadProxy(url) {
      const frame = document.getElementById('proxy-frame');
      const back = document.getElementById('back-btn');
      const home = document.getElementById('home');

      // Use relay directly for the initial page load
      frame.src = '/relay?url=' + encodeURIComponent(url);
      frame.style.display = 'block';
      back.style.display = 'block';
      home.style.display = 'none';

      // Update active tab label
      const activeTab = document.querySelector('.tab.active .tab-label');
      if (activeTab) {
        try {
          activeTab.textContent = new URL(url).hostname;
        } catch {}
      }
    }

    function goHome() {
      document.getElementById('proxy-frame').src = '';
      document.getElementById('proxy-frame').style.display = 'none';
      document.getElementById('back-btn').style.display = 'none';
      document.getElementById('home').style.display = 'flex';
      document.getElementById('url-input').value = '';
    }

    function newTab() {
      tabCount++;
      const tabbar = document.getElementById('tabbar');
      const newTabBtn = tabbar.querySelector('.new-tab');

      const tab = document.createElement('div');
      tab.className = 'tab';
      tab.innerHTML = `<span class="tab-label">tab${tabCount}</span><span class="tab-close" onclick="closeTab(this)">✕</span>`;
      tab.onclick = function(e) {
        if (e.target.classList.contains('tab-close')) return;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      };

      tabbar.insertBefore(tab, newTabBtn);
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      goHome();
    }

    function closeTab(btn) {
      const tab = btn.closest('.tab');
      const wasActive = tab.classList.contains('active');
      tab.remove();
      if (wasActive) {
        const remaining = document.querySelectorAll('.tab');
        if (remaining.length > 0) remaining[remaining.length - 1].classList.add('active');
        goHome();
      }
    }
  </script>
</body>
</html>
